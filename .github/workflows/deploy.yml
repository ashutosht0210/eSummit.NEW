name: CI/CD — E-Summit 2026 Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: self-hosted
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Node
        run: echo "Node: $(node -v) | NPM: $(npm -v)"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to /var/www/iic/esummit
        run: |
          rm -rf /var/www/iic/esummit
          mkdir -p /var/www/iic/esummit
          cp -r ./dist/* /var/www/iic/esummit/